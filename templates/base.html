<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanban Bug Tracker</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Kanban Bug Tracker</h1>
      <p>Modern issue management for projects and teams.</p>
    </div>
    <nav>
      <a href="{{ url_for('index') }}">Board</a>
      <a href="{{ url_for('issues') }}">All Issues</a>
      <a href="{{ url_for('create_issue') }}">Create Issue</a>
      <a href="{{ url_for('people') }}">People</a>
      <a href="{{ url_for('projects') }}">Projects</a>
      <a href="{{ url_for('issues_by_project') }}">By Project</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
