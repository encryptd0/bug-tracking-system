{% extends 'base.html' %}
{% block content %}
<section class="panel">
  <h2>All Issues by Project</h2>
  <table>
    <thead><tr><th>Project</th><th>Issue Count</th></tr></thead>
    <tbody>
      {% for row in rows %}
      <tr><td>{{ row.project_name }}</td><td>{{ row.issue_count }}</td></tr>
      {% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
