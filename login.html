<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kanban Bug Tracker</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body   class="login-body">
    <div class="bg-glow" aria-hidden="true"></div>
    <div class="login-container">
        <div class="login-card">
        <div class="login-header">
            <span class="eyebrow"> Secure Access </span>
            <h1> Bug Tracker </h1>
            <p>Sign in to manage issues, projects, and team members.</p>
      </div>

       <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="username">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            Username
          </label>
          <input type="text" id="username" name="username" placeholder="Enter your username" autocomplete="off" required />
           </div>

         <div class="form-group">
          <label for="password">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            Password
          </label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required />
        </div>

     <div id="loginError" class="login-error" style="display: none;"></div>

        <button type="submit" class="login-btn">Sign In</button>

        <div class="login-demo">
          <p>Demo Credentials:</p>
          <code>Username: admin</code>
          <code>Password: admin123</code>
        </div>
      </form>
    </div>
    
    <script src="Auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');

             if (login(username, password)) {
                // Successful login - redirect
                const redirectPage = localStorage.getItem('redirectAfterLogin') || 'index.html';
                localStorage.removeItem('redirectAfterLogin');
                window.location.href = redirectPage;
             } 
             else {
                errorDiv.textContent = 'Invalid username or password. Please try again.';
                errorDiv.style.display = 'block';

                document.getElementById('password').value = '';

                const card = document.querySelector('.login-card');
                card.style.animation = 'shake 0.3s ease-in-out';
                setTimeout(() => {
                     card.style.animation = '';
                }, 300);
             }
        });

     redirectIfAuthenticated();
    </script>
</body>
</html>
