<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Projects & People</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-glow" aria-hidden="true"></div>

  <header class="topbar shell">
    <div class="topbar-copy">
      <p class="eyebrow">Workspace Settings</p>
      <h1>Manage Projects &amp; People</h1>
      <p>Create projects and people from this dedicated page.</p>
    </div>
    <nav class="tab-nav">
      <a class="tab-link" href="index.html">Back to Dashboard &amp; Issues</a>
       <button class="tab-btn logout-btn" id="logoutBtn"> Logout </button>
    </nav>
  </header>

  <main class="shell">
    <section class="panel active split">
      <div class="subpanel">
        <h2>Create Project</h2>
        <p class="subtle">Start with your core streams of work.</p>
        <form id="projectForm" class="form-grid">
          <label>Project Name <input name="name" required /></label>
          <button type="submit">Add Project</button>
        </form>

        <h2 class="mt-lg">Projects</h2>
        <ul id="projectList" class="list plain"></ul>
      </div>

      <div class="subpanel">
        <h2>Create Person</h2>
        <p class="subtle">Build your team roster and assign ownership clearly.</p>
        <form id="personForm" class="form-grid">
          <label>Name <input name="name" required /></label>
          <label>Surname <input name="surname" required /></label>
          <label>Email <input type="email" name="email" required /></label>
          <label>Username <input name="username" required /></label>
          <label>Project
            <select name="projectId" id="personProjectSelect" required></select>
          </label>
          <label>Profile Picture URL <input name="profilePictureUrl" /></label>
          <button type="submit">Add Person</button>
        </form>

        <h2 class="mt-lg">People &amp; Assignments</h2>
        <ul id="peopleList" class="list"></ul>
      </div>
    </section>
  </main>

  
  <script src="auth.js"></script>
<script>
  (function() {
    if (!isAuthenticated()) {
      localStorage.setItem('redirectAfterLogin', 'manage.html');
      window.location.href = 'login.html';
      return;
    }
    
    const logoutBtn = document.getElementById('logoutBtn');
    if (logoutBtn) {
      logoutBtn.addEventListener('click', logout);
    }
  })();
</script>

<script src="manage.js"></script>

</body>
</html>
