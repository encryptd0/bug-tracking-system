<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bug Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Bug Tracker</h1>
    <p>Track projects, people, and issues in one place.</p>
  </header>

  <main>
    <section class="card">
      <h2>Create Person</h2>
      <form id="personForm" class="grid-form">
        <label>ID <input type="text" id="personId" required /></label>
        <label>Name <input type="text" id="personName" required /></label>
        <label>Surname <input type="text" id="personSurname" required /></label>
        <label>Email <input type="email" id="personEmail" required /></label>
        <label>Username <input type="text" id="personUsername" required /></label>
        <label>Profile Picture URL (optional) <input type="url" id="personAvatar" /></label>
        <button type="submit">Add Person</button>
      </form>
      <ul id="peopleList" class="chip-list"></ul>
    </section>

    <section class="card">
      <h2>Create Project</h2>
      <form id="projectForm" class="grid-form">
        <label>ID <input type="text" id="projectId" required /></label>
        <label>Name <input type="text" id="projectName" required /></label>
        <button type="submit">Add Project</button>
      </form>
      <ul id="projectList" class="chip-list"></ul>
    </section>

    <section class="card">
      <h2 id="issueFormTitle">Create Issue</h2>
      <form id="issueForm" class="grid-form">
        <input type="hidden" id="issueId" />
        <label>Summary <input type="text" id="summary" required /></label>
        <label>Description <textarea id="description" required></textarea></label>
        <label>Identified By <select id="identifiedBy" required></select></label>
        <label>Identified Date <input type="date" id="identifiedDate" required /></label>
        <label>Project <select id="projectIdIssue" required></select></label>
        <label>Assigned To <select id="assignedTo"><option value="">Unassigned</option></select></label>
        <label>Status
          <select id="status" required>
            <option value="open">Open</option>
            <option value="resolved">Resolved</option>
            <option value="overdue">Overdue</option>
          </select>
        </label>
        <label>Priority
          <select id="priority" required>
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
        </label>
        <label>Target Resolution Date <input type="date" id="targetDate" required /></label>
        <label>Actual Resolution Date <input type="date" id="actualDate" /></label>
        <label>Resolution Summary <textarea id="resolutionSummary"></textarea></label>
        <div class="actions">
          <button type="submit" id="saveIssueBtn">Create Issue</button>
          <button type="button" id="cancelEditBtn" class="secondary hidden">Cancel Edit</button>
        </div>
      </form>
    </section>

    <section class="card">
      <div class="toolbar">
        <h2>All Issues</h2>
        <label>Filter by Project
          <select id="projectFilter">
            <option value="">All Projects</option>
          </select>
        </label>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Summary</th>
              <th>Project</th>
              <th>Assigned To</th>
              <th>Status</th>
              <th>Priority</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="issueTableBody"></tbody>
        </table>
      </div>
    </section>

    <section class="card">
      <h2>Issue Details</h2>
      <div id="issueDetails" class="details-empty">Select an issue to view full details.</div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
