<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanban Bug Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-copy">
      <h1 id="topbarTitle">Dashboard</h1>
      <p id="topbarDescription">A unique high-level summary of projects, people, and issue health.</p>
    </div>
    <nav>
      <button class="tab-btn active" data-tab="dashboard">Dashboard</button>
      <button class="tab-btn" data-tab="issues">Issues</button>
      <a class="tab-link" href="manage.html">Manage Projects &amp; People</a>
    </nav>
  </header>

  <main>
    <section id="dashboard" class="tab panel active">
      <h2>Workspace Overview</h2>
      <div id="dashboardOverview" class="dashboard-grid"></div>
      <h2>Issue Status Health</h2>
      <div id="dashboardStatusHealth" class="dashboard-grid"></div>
      <h2>Distribution Snapshot</h2>
      <div id="dashboardDistribution" class="dashboard-grid"></div>
    </section>

    <section id="issues" class="tab panel">
      <div class="row-between">
        <h2>Issues</h2>
        <button id="createIssueBtn" type="button">Create New Issue</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th><th>Summary</th><th>Reported By</th><th>Project</th><th>Assignee</th><th>Status</th><th>Priority</th><th>Identified</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="issuesTableBody"></tbody>
        </table>
      </div>
      <div class="split" style="margin-top:1rem;">
        <div>
          <h3 id="issueFormTitle">Create Issue</h3>
          <form id="issueForm" class="form-grid"></form>
        </div>
        <div>
          <div class="row-between">
            <h3>Issue Detail</h3>
            <button id="detailEditBtn" type="button">Edit Issue</button>
          </div>
          <dl id="issueDetail" class="details"></dl>
        </div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
