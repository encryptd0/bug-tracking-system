<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bug Tracking</title>
  <link rel="stylesheet" href="styles.exact.css" />
</head>
<body>
  <div class="app-shell">
    <div class="window-strip" aria-hidden="true">
      <span></span><span></span><span></span>
    </div>

    <header class="hero">
      <div class="hero-spacer" aria-hidden="true"></div>
      <h1>Bug Tracking</h1>
      <div class="hero-actions">
        <div class="avatar-stack" id="headerAvatars"></div>
      </div>
    </header>

    <main>
      <section class="board" aria-label="Issue board">
        <article class="board-column">
          <div class="column-head"><h2>Backlog:</h2></div>
          <button type="button" class="mini-plus">+</button>
          <div class="column-list" id="backlogColumn"></div>
        </article>

        <article class="board-column">
          <div class="column-head"><h2>Ready:</h2></div>
          <button type="button" class="mini-plus">+</button>
          <div class="column-list" id="readyColumn"></div>
        </article>

        <article class="board-column">
          <div class="column-head"><h2>In progress:</h2></div>
          <button type="button" class="mini-plus">+</button>
          <div class="column-list" id="inProgressColumn"></div>
        </article>

        <article class="board-column">
          <div class="column-head"><h2>Done:</h2></div>
          <button type="button" class="mini-plus">+</button>
          <div class="column-list" id="doneColumn"></div>
        </article>
      </section>

      <section class="quick-filters" aria-label="Quick filters">
        <p class="quick-title">Focus</p>
        <div class="quick-filter-buttons">
          <button type="button" class="chip-btn is-active" data-filter="all">All Issues</button>
          <button type="button" class="chip-btn" data-filter="overdue">Needs Attention</button>
          <button type="button" class="chip-btn" data-filter="high-priority">High Priority</button>
          <button type="button" class="chip-btn" data-filter="my-open">Unassigned Open</button>
        </div>
      </section>

      <section class="panel two-col">
        <article class="card">
          <h2>Create Person</h2>
          <form id="personForm" class="grid-form compact-form">
            <label>ID <input type="text" id="personId" required /></label>
            <label>Name <input type="text" id="personName" required /></label>
            <label>Surname <input type="text" id="personSurname" required /></label>
            <label>Email <input type="email" id="personEmail" required /></label>
            <label>Username <input type="text" id="personUsername" required /></label>
            <label>Profile Picture URL (optional) <input type="url" id="personAvatar" /></label>
            <button type="submit">Add Person</button>
          </form>
          <ul id="peopleList" class="chip-list"></ul>
        </article>

        <article class="card">
          <h2>Create Project</h2>
          <form id="projectForm" class="grid-form compact-form">
            <label>ID <input type="text" id="projectId" required /></label>
            <label>Name <input type="text" id="projectName" required /></label>
            <button type="submit">Add Project</button>
          </form>
          <ul id="projectList" class="chip-list"></ul>
        </article>
      </section>

      <section class="panel two-col">
        <article class="card">
          <h2 id="issueFormTitle">Create Issue</h2>
          <form id="issueForm" class="grid-form">
            <input type="hidden" id="issueId" />
            <label>Summary <input type="text" id="summary" required /></label>
            <label>Description <textarea id="description" required></textarea></label>
            <label>Identified By <select id="identifiedBy" required></select></label>
            <label>Identified Date <input type="date" id="identifiedDate" required /></label>
            <label>Project <select id="projectIdIssue" required></select></label>
            <label>Assigned To <select id="assignedTo"><option value="">Unassigned</option></select></label>
            <label>Status
              <select id="status" required>
                <option value="open">Open</option>
                <option value="resolved">Resolved</option>
                <option value="overdue">Overdue</option>
              </select>
            </label>
            <label>Priority
              <select id="priority" required>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
              </select>
            </label>
            <label>Target Resolution Date <input type="date" id="targetDate" required /></label>
            <label>Actual Resolution Date <input type="date" id="actualDate" /></label>
            <label>Resolution Summary <textarea id="resolutionSummary"></textarea></label>
            <div class="actions">
              <button type="submit" id="saveIssueBtn">Create Issue</button>
              <button type="button" id="cancelEditBtn" class="secondary hidden">Cancel Edit</button>
            </div>
          </form>
        </article>

        <article class="card">
          <h2>Issue Details</h2>
          <div id="issueDetails" class="details-empty">Select an issue to view full details.</div>
        </article>
      </section>

      <section class="card">
        <div class="toolbar toolbar-filters">
          <h2>All Issues</h2>
          <div class="toolbar-controls">
            <label>Search
              <input type="search" id="issueSearch" placeholder="Search summary, ID, person..." />
            </label>
            <label>Project
              <select id="projectFilter">
                <option value="">All Projects</option>
              </select>
            </label>
            <label>Status
              <select id="statusFilter">
                <option value="">All Statuses</option>
                <option value="open">Open</option>
                <option value="overdue">Overdue</option>
                <option value="resolved">Resolved</option>
              </select>
            </label>
            <label>Priority
              <select id="priorityFilter">
                <option value="">All Priorities</option>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
              </select>
            </label>
            <label>Sort
              <select id="sortBy">
                <option value="target-asc">Target Date (Soonest)</option>
                <option value="target-desc">Target Date (Latest)</option>
                <option value="priority-desc">Priority (High → Low)</option>
                <option value="priority-asc">Priority (Low → High)</option>
              </select>
            </label>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Summary</th>
                <th>Project</th>
                <th>Assigned To</th>
                <th>Status</th>
                <th>Priority</th>
                <th>Target Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="issueTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
